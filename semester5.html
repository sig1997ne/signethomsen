<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5. semester | Signe Thomsen</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #f5f2ec;
}

/* LAYOUT */
.page-shell {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.page-inner {
  width: 100%;
  max-width: 1200px;
  height: 100%;
  display: flex;
  align-items: center;
}

.page-frame {
  width: 100%;
  max-height: 95vh;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.12);
  padding: 24px;
  background: rgba(255,255,255,0.35);

  display: flex;
  flex-direction: column;
}

/* HEADER */
.hero-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

h1 {
  margin: 0;
  font-size: 42px;
}

.back-btn {
  padding: 10px 14px;
  border: 1px solid rgba(0,0,0,0.3);
  background: white;
  cursor: pointer;
}

/* INTRO */
.intro {
  margin-top: 10px;
  color: #666;
}

/* CATEGORY */
.category-grid {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}

.category-card {
  flex: 1;
  padding: 12px;
  border: 1px solid rgba(0,0,0,0.2);
  background: white;
  cursor: pointer;
}

.category-card.active {
  background: black;
  color: white;
}

/* GALLERY */
.gallery-wrap {
  margin-top: 18px;
  border: 1px solid rgba(0,0,0,0.12);
  padding: 18px;
  background: rgba(255,255,255,0.4);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.gallery-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.grade-badge {
  white-space: nowrap;
  padding: 8px 12px;
  border: 1px solid rgba(0,0,0,0.3);
  background: white;
}

/* CAROUSEL */
.carousel-wrapper {
  flex: 1;
  overflow: hidden;
  margin-top: 15px;
}

.carousel-track {
  display: flex;
  transition: transform 0.45s ease;
}

/* SLIDE */
.carousel-slide {
  min-width: 100%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

/* CARD */
.preview-card {
  display: block;
  border: 1px solid rgba(0,0,0,0.15);
  background: white;
  overflow: hidden;
}

.preview-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CONTROLS */
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
}

.btn {
  width: 40px;
  height: 40px;
  border: 1px solid rgba(0,0,0,0.3);
  background: white;
  cursor: pointer;
}

.dots {
  display: flex;
  gap: 8px;
}

.dot {
  width: 8px;
  height: 8px;
  border: none;
  background: #bbb;
  cursor: pointer;
}

.dot.active {
  background: black;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .carousel-slide {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .carousel-slide {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<main class="page-shell">
<div class="page-inner">
<section class="page-frame">

<div class="hero-head">
  <h1>5. semester</h1>
  <button class="back-btn" onclick="history.back()">← Tilbage</button>
</div>

<p class="intro">
Renovering, analyse og projektering af eksisterende byggeri.
</p>

<div class="category-grid">
  <button class="category-card active" data-cat="vue">VUE</button>
  <button class="category-card" data-cat="lue">LUE</button>
  <button class="category-card" data-cat="hoved">HOVED</button>
</div>

<div class="gallery-wrap">

  <div class="gallery-head">
    <h2 id="title">VUE</h2>
    <div class="grade-badge" id="grade">Karakter: 12</div>
  </div>

  <div class="carousel-wrapper">
    <div class="carousel-track" id="track"></div>
  </div>

  <div class="controls">
    <button class="btn" id="prev">←</button>
    <div class="dots" id="dots"></div>
    <button class="btn" id="next">→</button>
  </div>

</div>

</section>
</div>
</main>

<script>

const data = {
  vue: { title:"VUE", grade:"Karakter: 12", folder:"images/projektering/5sem", prefix:"VUE", count:40 },
  lue: { title:"LUE", grade:"Karakter: 7", folder:"images/projektering/5sem", prefix:"lue", count:5 },
  hoved: { title:"Hovedprojekt", grade:"Karakter: 7", folder:"images/projektering/5sem", prefix:"Hoved", count:9 }
};

let current = "vue";
let slideIndex = 0;
let totalSlides = 0;

const track = document.getElementById("track");
const dots = document.getElementById("dots");

function perSlide() {
  if (window.innerWidth < 600) return 1;
  if (window.innerWidth < 900) return 2;
  return 3;
}

function build(cat) {
  const d = data[cat];

  document.getElementById("title").textContent = d.title;
  document.getElementById("grade").textContent = d.grade;

  let items = [];

  for (let i = 1; i <= d.count; i++) {
    items.push(`
      <a class="preview-card" href="${d.folder}/${d.prefix} (${i}).pdf" target="_blank">
        <div class="preview-image-wrap">
          <img src="${d.folder}/${d.prefix} (${i}).jpg">
        </div>
      </a>
    `);
  }

  const size = perSlide();
  const slides = [];

  for (let i = 0; i < items.length; i += size) {
    slides.push(`<div class="carousel-slide">${items.slice(i, i+size).join("")}</div>`);
  }

  track.innerHTML = slides.join("");

  totalSlides = slides.length;
  slideIndex = 0;

  dots.innerHTML = "";
  for (let i = 0; i < totalSlides; i++) {
    const d = document.createElement("button");
    d.className = "dot";
    d.onclick = () => { slideIndex = i; update(); };
    dots.appendChild(d);
  }

  update();
}

function update() {
  track.style.transform = `translateX(-${slideIndex * 100}%)`;

  document.querySelectorAll(".dot").forEach((d,i)=>{
    d.classList.toggle("active", i === slideIndex);
  });
}

document.getElementById("prev").onclick = () => {
  slideIndex = (slideIndex - 1 + totalSlides) % totalSlides;
  update();
};

document.getElementById("next").onclick = () => {
  slideIndex = (slideIndex + 1) % totalSlides;
  update();
};

document.querySelectorAll(".category-card").forEach(btn=>{
  btn.onclick = () => {
    document.querySelectorAll(".category-card").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    current = btn.dataset.cat;
    build(current);
  };
});

window.addEventListener("resize", () => build(current));

build(current);

</script>

</body>
</html>
