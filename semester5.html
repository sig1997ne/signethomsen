<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5. semester | Signe Thomsen</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden; /* 🔥 ingen scroll */
  font-family: Arial, sans-serif;
  background: #f5f2ec;
}

/* CENTER SIDE */
.page-shell {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

.page-inner {
  width: 100%;
  max-width: 1200px;
  height: 100%;
  display: flex;
  align-items: center;
}

/* FRAME */
.page-frame {
  width: 100%;
  max-height: 95vh;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.12);
  padding: 24px;
  background: rgba(255,255,255,0.35);

  display: flex;
  flex-direction: column;
}

/* HEADER */
.hero-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

h1 {
  margin: 0;
  font-size: 42px;
}

.back-btn {
  white-space: nowrap;
  padding: 10px 14px;
  border: 1px solid rgba(0,0,0,0.3);
  background: white;
  cursor: pointer;
}

/* INTRO */
.intro {
  margin-top: 12px;
  color: #666;
  line-height: 1.5;
  max-width: 900px;
}

/* CATEGORY */
.category-grid {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}

.category-card {
  flex: 1;
  padding: 12px;
  border: 1px solid rgba(0,0,0,0.2);
  background: white;
  cursor: pointer;
}

.category-card.active {
  background: black;
  color: white;
}

/* GALLERY */
.gallery-wrap {
  margin-top: 18px;
  border: 1px solid rgba(0,0,0,0.12);
  padding: 18px;
  background: rgba(255,255,255,0.4);

  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.gallery-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* FIX: én linje */
.grade-badge {
  white-space: nowrap;
  padding: 8px 12px;
  border: 1px solid rgba(0,0,0,0.3);
  background: white;
  font-size: 14px;
}

/* CAROUSEL */
.carousel-wrapper {
  flex: 1;
  overflow: hidden;
  margin-top: 15px;
}

.carousel-track {
  display: flex;
  transition: transform 0.5s ease;
}

/* SLIDES */
.carousel-slide {
  min-width: 100%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

/* CARD */
.preview-card {
  display: block;
  border: 1px solid rgba(0,0,0,0.15);
  background: white;
  height: 100%;
  overflow: hidden;
}

/* IMAGE FULL COVER */
.preview-image-wrap {
  width: 100%;
  height: 100%;
}

.preview-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .carousel-slide {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .carousel-slide {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<main class="page-shell">
<div class="page-inner">
<section class="page-frame">

<div class="hero-head">
  <h1>5. semester</h1>
  <button class="back-btn" onclick="history.back()">← Tilbage</button>
</div>

<p class="intro">
5. semester handler om renovering og eksisterende byggeri.
Vi arbejder med analyse, projektering og tekniske løsninger.
</p>

<div class="category-grid">
  <button class="category-card active" data-cat="vue">VUE</button>
  <button class="category-card" data-cat="lue">LUE</button>
  <button class="category-card" data-cat="hoved">HOVED</button>
</div>

<div class="gallery-wrap">

  <div class="gallery-head">
    <h2 id="title">VUE</h2>
    <div class="grade-badge" id="grade">Karakter: 12</div>
  </div>

  <div class="carousel-wrapper">
    <div class="carousel-track" id="track"></div>
  </div>

</div>

</section>
</div>
</main>

<script>
const galleryData = {
  vue: {
    title: 'VUE',
    grade: 'Karakter: 12',
    text: 'Karakter 12. Klik på en side for at åbne den tilhørende PDF.',
    label: 'VUE',
    folder: 'images/projektering/5sem',
    prefix: 'VUE',
    count: 40
  },
  lue: {
    title: 'LUE',
    grade: 'Karakter: 7',
    text: 'Karakter 7. Klik på en side for at åbne den tilhørende PDF.',
    label: 'lue',
    folder: 'images/projektering/5sem',
    prefix: 'lue',
    count: 5
  },
  hoved: {
    title: 'Hovedprojekt',
    grade: 'Karakter: 7',
    text: 'Karakter 7. Klik på en side for at åbne den tilhørende PDF.',
    label: 'Hoved',
    folder: 'images/projektering/5sem',
    prefix: 'Hoved',
    count: 9
  }
};

let current = "vue";
let currentSlide = 0;
let totalSlides = 0;

const track = document.getElementById("track");

function render(cat) {
  const d = galleryData[cat];

  document.getElementById("title").innerText = d.title;
  document.getElementById("grade").innerText = d.grade;

  const items = [];

  for (let i = 1; i <= d.count; i++) {
    items.push(`
      <a class="preview-card" href="${d.folder}/${d.prefix} (${i}).pdf" target="_blank">
        <div class="preview-image-wrap">
          <img src="${d.folder}/${d.prefix} (${i}).jpg">
        </div>
      </a>
    `);
  }

  const slides = [];
  for (let i = 0; i < items.length; i += 3) {
    slides.push(`<div class="carousel-slide">${items.slice(i, i + 3).join("")}</div>`);
  }

  track.innerHTML = slides.join("");

  totalSlides = slides.length;
  currentSlide = 0;

  update();
}

function update() {
  track.style.transform = `translateX(-${currentSlide * 100}%)`;
}

document.querySelectorAll(".category-card").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".category-card").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    current = btn.dataset.cat;
    render(current);
  };
});

render(current);
</script>

</body>
</html>
