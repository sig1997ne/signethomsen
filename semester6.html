<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6. semester | Praktik</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f5f2ec;
      color: #171717;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 100px 24px 60px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
      letter-spacing: -0.03em;
    }

    .grade {
      border: 1px solid rgba(0,0,0,0.2);
      padding: 10px 14px;
      font-weight: 600;
      background: rgba(255,255,255,0.6);
    }

    .text {
      max-width: 700px;
      line-height: 1.7;
      color: #555;
      margin-bottom: 50px;
      font-size: 1.05rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .gallery img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border: 1px solid rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }

    .gallery img:hover {
      transform: scale(1.02);
    }

    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      .gallery img {
        height: 240px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="top-bar">
      <h1>6. semester – Praktik</h1>
      <div class="grade">Karakter: 12</div>
    </div>

    <div class="text">
      <p>
        Praktikforløbet gav indsigt i den daglige arbejdsgang på en tegnestue,
        hvor jeg arbejdede med projektering, BIM-modellering og tværfagligt samarbejde.
        Jeg fik ansvar for mindre opgaver og deltog i udviklingen af konkrete byggeprojekter
        fra idé til udførelse.
      </p>
    </div>

    <div class="gallery">
      <img src="images/6sem/1.jpg" alt="Praktik billede 1">
      <img src="images/6sem/2.jpg" alt="Praktik billede 2">
      <img src="images/6sem/3.jpg" alt="Praktik billede 3">
    </div>

  </div>

</body>
</html>
